<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Movie and Games Night!</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>🎬🎮 Movie and Games Night!</h1>
      <p class="tag">Pick your night · Pick your snack · Have fun!</p>
    </div>
    <div class="top-actions">
      <button id="new-booking" class="btn">+ New Booking</button>
    </div>
  </header>

  <main id="main">
    <section id="bookings-section" class="section active">
      <div class="section-header bookings-header">
        <h2>📅 Your Bookings</h2>
      </div>
      <div id="bookings-list" class="list bookings-list"></div>
    </section>
  </main>

  <div id="modal" class="modal hidden" aria-hidden="true">
    <div class="modal-content">
      <button id="modal-close" class="modal-close" aria-label="Close">×</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="script-wizard.js"></script>
</body>
</html>
